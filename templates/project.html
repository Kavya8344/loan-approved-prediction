<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loan Eligibility Checker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#0f172a,#1e40af);
    min-height:100vh;
}

.navbar{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

.form-card{
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.form-control{
    border-radius:10px;
    padding:12px;
}

.btn-predict{
    width:100%;
    padding:12px;
    border-radius:10px;
    font-size:18px;
}

.result-card{
    background:#f8fafc;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

.approved{
    color:green;
    font-weight:bold;
}

.rejected{
    color:red;
    font-weight:bold;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">

<a class="navbar-brand fw-bold" href="/">Loan Predictor</a>

<div class="navbar-nav ms-auto">

<a class="nav-link" href="/">Home</a>
<a class="nav-link" href="/history">History</a>
<a class="nav-link" href="/about">About</a>
<a class="nav-link" href="/contact">Contact</a>

</div>

</div>
</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="form-card">

<h2 class="text-center mb-4">
Loan Eligibility Prediction
</h2>

<form action="{{ url_for('predict') }}" method="POST">

<div class="mb-3">
<label class="form-label">Income</label>
<input type="number"
class="form-control"
name="income"
required>
</div>

<div class="mb-3">
<label class="form-label">Credit Score</label>
<input type="number"
class="form-control"
name="credit_score"
required>
</div>

<div class="mb-3">
<label class="form-label">Loan Amount</label>
<input type="number"
class="form-control"
name="loan_amount"
required>
</div>

<div class="mb-3">
<label class="form-label">Years Employed</label>
<input type="number"
class="form-control"
name="years_employed"
required>
</div>


<button type="submit"
class="btn btn-primary btn-predict">
Check Eligibility
</button>

</form>

{% if prediction %}

<div class="result-card text-center">

<h4>Prediction Result</h4>

{% if prediction == "Approved" %}

<h2 class="approved">
✅ LOAN APPROVED
</h2>

{% else %}

<h2 class="rejected">
❌ LOAN NOT APPROVED
</h2>

{% endif %}

</div>

{% endif %}

</div>

</div>

</div>

</div>

</body>
</html>
